run:
  name: p1c_pcen_babble
  seed: 1337
  device: cpu
  out_dir: runs/p1c_pcen_babble

data:
  root: data/speech_commands_v2
  subset_train: 12000        # 1/3 of full SC V2 — enough to validate the recipe
  batch_size: 64
  num_workers: 4
  sample_rate: 16000

model:
  trunk: bc_resnet8
  use_pcen: true
  n_mels: 40
  num_classes: 12

optim:
  lr: 4.0e-3
  weight_decay: 1.0e-4
  epochs: 12                  # short run; goal is to validate babble recipe, not match P0 SOTA
  scheduler: cosine
  warmup_epochs: 1

augment:
  specaugment: true
  rir_prob: 0.4
  musan_prob: 0.4
  snr_range: [-5, 20]
  babble_prob: 0.4
  babble_voices: [1, 1]       # single competing voice — cheaper, still tests the principle
  babble_snr_range: [-5, 20]
